<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT AI Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 360px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #111 100%);
            color: #fff;
        }

        .container { padding: 20px; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #222;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .brand h1 {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #ff4d4d);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version {
            font-size: 10px;
            background: #222;
            color: #888;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Video Preview */
        .video-preview {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .video-preview.active { display: block; }

        .video-preview .video-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .video-preview img {
            width: 80px;
            height: 45px;
            border-radius: 6px;
            object-fit: cover;
        }

        .video-preview .video-details h3 {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-preview .video-details span {
            font-size: 11px;
            color: #888;
        }

        /* Status */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .status-row .label { color: #888; }
        .status-row .value { font-weight: 600; color: #fff; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ea043;
            display: inline-block;
            margin-right: 6px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: #fff;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #e60000, #b30000);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background: #222;
            border-color: #444;
            color: #fff;
        }

        /* Not YouTube Warning */
        .warning {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid rgba(255, 165, 0, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #ffaa00;
            text-align: center;
            display: none;
        }

        .warning.active { display: block; }

        /* Footer */
        .footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #222;
            text-align: center;
            font-size: 11px;
            color: #555;
        }

        /* Auth Section */
        .auth-section {
            margin-bottom: 16px;
        }

        .btn-google {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-google:hover {
            background: #222;
            border-color: #444;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 10px 14px;
        }

        .user-info .user-details {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info .user-name {
            font-size: 13px;
            font-weight: 600;
        }

        .btn-logout {
            background: none;
            border: none;
            color: #888;
            font-size: 11px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .btn-logout:hover { color: #ff4d4d; }

        /* Loading spinner on button */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="brand-icon">AI</div>
                <h1>YT AI Analyzer</h1>
            </div>
            <span class="version">v1.0</span>
        </div>

        <!-- Auth Section -->
        <div class="auth-section" id="auth-section">
            <div id="logged-out-view">
                <button id="google-login-btn" class="btn-google">
                    <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    Google ile Giris Yap
                </button>
            </div>
            <div id="logged-in-view" style="display:none">
                <div class="user-info">
                    <div class="user-details">
                        <img id="user-avatar" class="user-avatar" src="" alt="">
                        <span id="user-name" class="user-name">-</span>
                    </div>
                    <button id="logout-btn" class="btn-logout">Cikis</button>
                </div>
            </div>
        </div>

        <div class="warning" id="not-youtube-warning">
            Bir YouTube video sayfasina gidin ve tekrar deneyin.
        </div>

        <div id="login-warning" class="warning">
            Analiz yapmak icin giris yapin.
        </div>

        <div class="video-preview" id="video-preview">
            <div class="video-info">
                <img id="preview-thumb" src="" alt="">
                <div class="video-details">
                    <h3 id="preview-title">Video Basligi</h3>
                    <span id="preview-channel">Kanal Adi</span>
                </div>
            </div>
        </div>

        <div class="status-row">
            <span class="label">Durum</span>
            <span class="value"><span class="status-dot" id="status-dot"></span><span id="status-text">Hazir</span></span>
        </div>

        <div class="status-row">
            <span class="label">Abonelik</span>
            <span class="value" id="sub-status">-</span>
        </div>

        <div class="status-row">
            <span class="label">Kalan Limit</span>
            <span class="value" id="usage-limit">-</span>
        </div>

        <div class="btn-group">
            <button id="analyze-btn" class="btn btn-primary" disabled>
                <span class="spinner"></span>
                <span class="btn-text">Videoyu Analiz Et</span>
            </button>
            <button id="dashboard-btn" class="btn btn-secondary">
                Gecmis Analizler
            </button>
        </div>

        <div class="footer">
            YouTube sayfasinda sag tikla > "Analyze Video with AI"
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../lib/supabase.js"></script>
    <script src="index.js"></script>
</body>

</html>
