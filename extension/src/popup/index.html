<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT AI Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 360px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(160deg, #0a0a0a 0%, #0d0d12 50%, #110a0a 100%);
            color: #fff;
            overflow: hidden;
        }

        .container { padding: 20px; }

        /* Animasyonlar */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .container > * {
            animation: fadeInUp 0.5s ease-out both;
        }
        .container > *:nth-child(1) { animation-delay: 0.03s; }
        .container > *:nth-child(2) { animation-delay: 0.08s; }
        .container > *:nth-child(3) { animation-delay: 0.13s; }
        .container > *:nth-child(4) { animation-delay: 0.18s; }
        .container > *:nth-child(5) { animation-delay: 0.23s; }
        .container > *:nth-child(6) { animation-delay: 0.28s; }
        .container > *:nth-child(7) { animation-delay: 0.33s; }
        .container > *:nth-child(8) { animation-delay: 0.38s; }
        .container > *:nth-child(9) { animation-delay: 0.43s; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 4px 16px rgba(255, 0, 0, 0.25);
        }

        .brand h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(90deg, #fff, #ff4d4d);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: #666;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Glass card mixin */
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
        }

        /* Video Preview */
        .video-preview {
            padding: 14px;
            margin-bottom: 14px;
            display: none;
        }

        .video-preview.active { display: block; }

        .video-preview .video-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .video-preview img {
            width: 80px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
        }

        .video-preview .video-details h3 {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-preview .video-details span {
            font-size: 11px;
            color: #888;
        }

        /* Status & Usage */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .status-row .label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-row .value { font-weight: 600; color: #fff; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ea043;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px rgba(46, 160, 67, 0.5);
        }

        /* Usage Ring */
        .usage-ring-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 18px;
            margin-bottom: 14px;
        }

        .ring-wrapper { position: relative; }

        .ring-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .ring-value {
            font-size: 20px;
            font-weight: 800;
            display: block;
            line-height: 1;
        }

        .ring-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .ring-progress { transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        .ring-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ring-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }

        .ring-info-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .ring-info-dot.used { background: rgba(255, 255, 255, 0.15); }
        .ring-info-dot.remaining { background: #ff4d4d; }
        .ring-info-dot.pro { background: #2ea043; }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 14px;
        }

        .btn {
            width: 100%;
            padding: 13px 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 6px 24px rgba(255, 0, 0, 0.35);
        }

        .btn-primary:hover::after { opacity: 1; }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 8px rgba(255, 0, 0, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        /* Warning */
        .warning {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .warning.active { display: block; }

        #not-youtube-warning {
            background: rgba(255, 165, 0, 0.08);
            border: 1px solid rgba(255, 165, 0, 0.2);
            color: #ffaa00;
        }

        #login-warning {
            background: rgba(47, 129, 247, 0.08);
            border: 1px solid rgba(47, 129, 247, 0.2);
            color: #6cb4ff;
        }

        /* Footer */
        .footer {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            font-size: 11px;
            color: #444;
        }

        /* Auth Section */
        .auth-section { margin-bottom: 14px; }

        .btn-google {
            width: 100%;
            padding: 11px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
        }

        .user-info .user-details {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .user-info .user-name {
            font-size: 13px;
            font-weight: 600;
        }

        .btn-logout {
            background: none;
            border: none;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-logout:hover { color: #ff4d4d; background: rgba(255, 0, 0, 0.08); }

        /* Loading spinner */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }

        /* Pro Upgrade Banner */
        .pro-upgrade-banner {
            display: none;
            padding: 12px 14px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(255, 140, 0, 0.08));
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
        }
        .pro-upgrade-banner:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 140, 0, 0.12));
            border-color: rgba(255, 215, 0, 0.25);
            transform: translateY(-1px);
        }
        .pro-upgrade-banner.active { display: block; }
        .pro-upgrade-banner .pro-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #000;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .pro-upgrade-banner .pro-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
        }
        .pro-upgrade-banner .pro-desc {
            font-size: 11px;
            color: #999;
        }
        .pro-upgrade-banner .pro-price {
            color: #FFD700;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="brand-icon">AI</div>
                <h1>YT AI Analyzer</h1>
            </div>
            <span class="version">v1.0</span>
        </div>

        <!-- Auth Section -->
        <div class="auth-section" id="auth-section">
            <div id="logged-out-view">
                <button id="google-login-btn" class="btn-google">
                    <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    <span data-i18n="login_with_google">Google ile Giriş Yap</span>
                </button>
            </div>
            <div id="logged-in-view" style="display:none">
                <div class="user-info glass">
                    <div class="user-details">
                        <img id="user-avatar" class="user-avatar" src="" alt="">
                        <span id="user-name" class="user-name">-</span>
                    </div>
                    <button id="logout-btn" class="btn-logout" data-i18n="logout">Çıkış</button>
                </div>
            </div>
        </div>

        <div class="warning" id="not-youtube-warning">
            <span data-i18n="not_youtube_warning">Bir YouTube video sayfasına gidin ve tekrar deneyin.</span>
        </div>

        <div id="login-warning" class="warning" data-i18n="login_warning">
            Analiz yapmak için giriş yapın.
        </div>

        <div class="video-preview glass" id="video-preview">
            <div class="video-info">
                <img id="preview-thumb" src="" alt="">
                <div class="video-details">
                    <h3 id="preview-title" data-i18n="video_title_placeholder">Video Basligi</h3>
                    <span id="preview-channel" data-i18n="channel_name_placeholder">Kanal Adi</span>
                </div>
            </div>
        </div>

        <div class="status-row glass">
            <span class="label" data-i18n="status">Durum</span>
            <span class="value"><span class="status-dot" id="status-dot"></span><span id="status-text" data-i18n="ready">Hazır</span></span>
        </div>

        <div class="status-row glass">
            <span class="label" data-i18n="subscription">Abonelik</span>
            <span class="value" id="sub-status">-</span>
        </div>

        <!-- Usage Ring -->
        <div class="usage-ring-container glass" id="usage-section">
            <div class="ring-wrapper">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
                    <circle class="ring-progress" id="ring-progress" cx="40" cy="40" r="34" fill="none"
                        stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"
                        stroke-dasharray="213.6" stroke-dashoffset="213.6"
                        transform="rotate(-90 40 40)"/>
                    <defs>
                        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ff0000"/>
                            <stop offset="100%" stop-color="#ff6666"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="ring-text">
                    <span class="ring-value" id="ring-value">-</span>
                    <span class="ring-label" data-i18n="remaining">kalan</span>
                </div>
            </div>
            <div class="ring-info">
                <div class="ring-info-item">
                    <span class="ring-info-dot remaining"></span>
                    <span id="ring-remaining-text" data-i18n="remaining_rights">Kalan hak</span>
                </div>
                <div class="ring-info-item">
                    <span class="ring-info-dot used"></span>
                    <span id="ring-used-text" data-i18n="used">Kullanılan</span>
                </div>
            </div>
        </div>

        <!-- Pro Upgrade Banner (free users) -->
        <div class="pro-upgrade-banner" id="pro-upgrade-banner">
            <span class="pro-badge">PRO</span>
            <div class="pro-title" data-i18n="pro_full_access">Tam Analiz Erisimi</div>
            <div class="pro-desc"><span data-i18n="pro_see_all">Tüm sonuçları görün</span> - <span class="pro-price">$9.99/ay</span></div>
        </div>

        <div class="btn-group">
            <button id="analyze-btn" class="btn btn-primary" disabled>
                <span class="spinner"></span>
                <span class="btn-text" data-i18n="analyze_video">Videoyu Analiz Et</span>
            </button>
            <button id="dashboard-btn" class="btn btn-secondary" data-i18n="analysis_history">
                Geçmiş Analizler
            </button>
        </div>

        <div class="footer" data-i18n="popup_footer">
            YouTube sayfasında sağ tıkla > "Analyze Video with AI"
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../lib/i18n.js"></script>
    <script src="../lib/supabase.js"></script>
    <script src="index.js"></script>
</body>

</html>
