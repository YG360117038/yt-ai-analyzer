<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dion Youtube Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 360px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(160deg, #0a0a0a 0%, #0d0d12 50%, #110a0a 100%);
            color: #fff;
            overflow: hidden;
        }

        .container { padding: 20px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container > * { animation: fadeInUp 0.4s ease-out both; }
        .container > *:nth-child(1) { animation-delay: 0.03s; }
        .container > *:nth-child(2) { animation-delay: 0.07s; }
        .container > *:nth-child(3) { animation-delay: 0.11s; }
        .container > *:nth-child(4) { animation-delay: 0.15s; }
        .container > *:nth-child(5) { animation-delay: 0.19s; }
        .container > *:nth-child(6) { animation-delay: 0.23s; }
        .container > *:nth-child(7) { animation-delay: 0.27s; }
        .container > *:nth-child(8) { animation-delay: 0.31s; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .brand { display: flex; align-items: center; gap: 10px; }

        .brand-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            box-shadow: 0 3px 12px rgba(255,68,68,0.3);
        }

        .brand h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(90deg, #fff, #ff6666);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version {
            font-size: 10px;
            background: rgba(255,255,255,0.06);
            color: #555;
            padding: 2px 7px;
            border-radius: 20px;
        }

        /* Glass */
        .glass {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
        }

        /* Page indicator */
        .page-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .page-indicator.video-page {
            background: rgba(255, 68, 68, 0.08);
            border: 1px solid rgba(255, 68, 68, 0.2);
            color: #ff8888;
        }

        .page-indicator.channel-page {
            background: rgba(123, 104, 238, 0.08);
            border: 1px solid rgba(123, 104, 238, 0.2);
            color: #a99af5;
        }

        .page-indicator.other-page {
            background: rgba(255, 165, 0, 0.08);
            border: 1px solid rgba(255, 165, 0, 0.15);
            color: #ffaa55;
        }

        .page-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .video-page .page-dot { background: #ff4444; box-shadow: 0 0 6px rgba(255,68,68,0.5); }
        .channel-page .page-dot { background: #7b68ee; box-shadow: 0 0 6px rgba(123,104,238,0.5); }
        .other-page .page-dot { background: #ff9922; }

        /* Video / Channel Preview */
        .preview-card {
            padding: 12px;
            margin-bottom: 10px;
            display: none;
        }
        .preview-card.active { display: block; }

        .preview-inner {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .preview-thumb {
            width: 72px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
        }

        .preview-info h3 {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #f1f1f1;
        }

        .preview-info span {
            font-size: 11px;
            color: #777;
        }

        /* Status rows */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 12px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .status-row .label { color: #555; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
        .status-row .value { font-weight: 600; color: #fff; }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 6px rgba(34,197,94,0.5);
        }

        /* Usage ring */
        .usage-ring-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .ring-wrapper { position: relative; }
        .ring-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .ring-value { font-size: 18px; font-weight: 800; display: block; line-height: 1; }
        .ring-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .ring-progress { transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
        .ring-info { display: flex; flex-direction: column; gap: 5px; }
        .ring-info-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #777; }
        .ring-info-dot { width: 7px; height: 7px; border-radius: 50%; }
        .ring-info-dot.used { background: rgba(255,255,255,0.12); }
        .ring-info-dot.remaining { background: #ff4444; }
        .ring-info-dot.pro { background: #22c55e; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 7px; margin-top: 12px; }

        .btn {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .btn-video {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .btn-video::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.22s;
        }
        .btn-video:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,68,68,0.35); }
        .btn-video:hover::after { opacity: 1; }
        .btn-video:active { transform: translateY(0) scale(0.98); }
        .btn-video:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .btn-channel {
            background: linear-gradient(135deg, #7b68ee, #5b4bd4);
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .btn-channel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.22s;
        }
        .btn-channel:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123,104,238,0.35); }
        .btn-channel:hover::after { opacity: 1; }
        .btn-channel:active { transform: translateY(0) scale(0.98); }
        .btn-channel:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .btn-secondary {
            background: rgba(255,255,255,0.04);
            color: #999;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.14);
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-secondary:active { transform: translateY(0); }

        /* Spinner */
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }

        /* Warnings */
        .warning {
            border-radius: 9px;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 12px;
            text-align: center;
            display: none;
            line-height: 1.5;
        }
        .warning.active { display: block; }

        #not-youtube-warning {
            background: rgba(255,153,0,0.07);
            border: 1px solid rgba(255,153,0,0.18);
            color: #ff9922;
        }
        #login-warning {
            background: rgba(59,130,246,0.07);
            border: 1px solid rgba(59,130,246,0.18);
            color: #6cb4ff;
        }

        /* Pro upgrade banner */
        .pro-upgrade-banner {
            display: none;
            padding: 11px 13px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, rgba(255,215,0,0.07), rgba(255,140,0,0.07));
            border: 1px solid rgba(255,215,0,0.13);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.22s;
        }
        .pro-upgrade-banner:hover {
            background: linear-gradient(135deg, rgba(255,215,0,0.11), rgba(255,140,0,0.11));
            transform: translateY(-1px);
        }
        .pro-upgrade-banner.active { display: block; }
        .pro-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #000;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 4px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        .pro-title { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 2px; }
        .pro-desc { font-size: 11px; color: #888; }
        .pro-price { color: #FFD700; font-weight: 700; }

        /* Auth section */
        .auth-section { margin-bottom: 12px; }

        .btn-google {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.22s;
        }
        .btn-google:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.13); transform: translateY(-1px); }

        .user-info { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; }
        .user-details { display: flex; align-items: center; gap: 9px; }
        .user-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .user-name { font-size: 12px; font-weight: 600; }

        .btn-logout {
            background: none; border: none;
            color: #555; font-size: 11px;
            cursor: pointer; padding: 3px 7px;
            border-radius: 5px; transition: all 0.18s;
        }
        .btn-logout:hover { color: #ff4444; background: rgba(255,0,0,0.07); }

        /* Footer */
        .footer {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.04);
            text-align: center;
            font-size: 10px;
            color: #3a3a3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="brand-icon">AI</div>
                <h1>Dion Youtube Analyzer</h1>
            </div>
            <span class="version">v2.0</span>
        </div>

        <!-- Auth Section -->
        <div class="auth-section" id="auth-section">
            <div id="logged-out-view">
                <button id="google-login-btn" class="btn-google">
                    <svg width="15" height="15" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    <span data-i18n="login_with_google">Google ile Giriş Yap</span>
                </button>
            </div>
            <div id="logged-in-view" style="display:none">
                <div class="user-info glass">
                    <div class="user-details">
                        <img id="user-avatar" class="user-avatar" src="" alt="">
                        <span id="user-name" class="user-name">-</span>
                    </div>
                    <button id="logout-btn" class="btn-logout" data-i18n="logout">Çıkış</button>
                </div>
            </div>
        </div>

        <!-- Page indicator -->
        <div id="page-indicator" class="page-indicator other-page" style="display:none">
            <span class="page-dot"></span>
            <span id="page-indicator-text"></span>
        </div>

        <!-- Warnings -->
        <div class="warning" id="not-youtube-warning">
            <span data-i18n="not_youtube_warning">Bir YouTube video veya kanal sayfasına gidin.</span>
        </div>
        <div id="login-warning" class="warning">
            <span data-i18n="login_warning">Analiz yapmak için giriş yapın.</span>
        </div>

        <!-- Preview (video or channel) -->
        <div class="preview-card glass" id="preview-card">
            <div class="preview-inner">
                <img id="preview-thumb" class="preview-thumb" src="" alt="">
                <div class="preview-info">
                    <h3 id="preview-title"></h3>
                    <span id="preview-subtitle"></span>
                </div>
            </div>
        </div>

        <!-- Status rows -->
        <div class="status-row glass">
            <span class="label" data-i18n="status">Durum</span>
            <span class="value"><span class="status-dot" id="status-dot"></span><span id="status-text" data-i18n="ready">Hazır</span></span>
        </div>

        <div class="status-row glass">
            <span class="label" data-i18n="subscription">Abonelik</span>
            <span class="value" id="sub-status">-</span>
        </div>

        <!-- Usage Ring -->
        <div class="usage-ring-container glass" id="usage-section">
            <div class="ring-wrapper">
                <svg width="76" height="76" viewBox="0 0 76 76">
                    <circle cx="38" cy="38" r="32" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="5"/>
                    <circle class="ring-progress" id="ring-progress" cx="38" cy="38" r="32" fill="none"
                        stroke="url(#ringGrad)" stroke-width="5" stroke-linecap="round"
                        stroke-dasharray="201.1" stroke-dashoffset="201.1"
                        transform="rotate(-90 38 38)"/>
                    <defs>
                        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#ff4444"/>
                            <stop offset="100%" stop-color="#ff8888"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="ring-text">
                    <span class="ring-value" id="ring-value">-</span>
                    <span class="ring-label" data-i18n="remaining">kalan</span>
                </div>
            </div>
            <div class="ring-info">
                <div class="ring-info-item">
                    <span class="ring-info-dot remaining"></span>
                    <span id="ring-remaining-text" data-i18n="remaining_rights">Kalan hak</span>
                </div>
                <div class="ring-info-item">
                    <span class="ring-info-dot used"></span>
                    <span id="ring-used-text" data-i18n="used">Kullanılan</span>
                </div>
            </div>
        </div>

        <!-- Pro Upgrade Banner -->
        <div class="pro-upgrade-banner" id="pro-upgrade-banner">
            <span class="pro-badge">PRO</span>
            <div class="pro-title" data-i18n="pro_full_access">Tam Analiz Erişimi</div>
            <div class="pro-desc"><span data-i18n="pro_see_all">Tüm sonuçları görün</span> - <span class="pro-price">$9.99/ay</span></div>
        </div>

        <!-- Buttons -->
        <div class="btn-group">
            <button id="analyze-btn" class="btn btn-video" disabled>
                <span class="spinner"></span>
                <span class="btn-text" data-i18n="analyze_video">Videoyu Analiz Et</span>
            </button>
            <button id="channel-btn" class="btn btn-channel" disabled style="display:none">
                <span class="spinner"></span>
                <span class="btn-text" data-i18n="analyze_channel">Kanalı Analiz Et</span>
            </button>
            <button id="dashboard-btn" class="btn btn-secondary" data-i18n="analysis_history">
                Geçmiş Analizler
            </button>
        </div>

        <div class="footer" data-i18n="popup_footer">
            Sağ tıkla > "Analyze with AI" veya popup'tan analiz başlat
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../lib/i18n.js"></script>
    <script src="../lib/supabase.js"></script>
    <script src="index.js"></script>
</body>
</html>
