<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - YT AI Analyzer</title>
    <style>
        :root {
            --primary: #ff0000;
            --bg: #0a0a0a;
            --card-bg: #141414;
            --border: #1e1e1e;
            --text: #f0f0f0;
            --text-dim: #888;
            --green: #2ea043;
            --blue: #2f81f7;
            --orange: #d29922;
            --purple: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .badge {
            background: var(--primary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Stat kartlari */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            transition: all 0.25s ease;
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card:nth-child(1) .stat-value { color: var(--blue); }
        .stat-card:nth-child(2) .stat-value { color: var(--green); }
        .stat-card:nth-child(3) .stat-value { color: var(--purple); }
        .stat-card:nth-child(4) .stat-value { color: var(--orange); }

        /* Tab sistemi */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
        .tab-btn.active { background: rgba(255, 0, 0, 0.15); color: var(--primary); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Tablo */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            font-weight: 600;
        }

        td {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            font-size: 14px;
        }

        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .plan-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .plan-free { background: rgba(136, 136, 136, 0.2); color: var(--text-dim); }
        .plan-pro { background: rgba(46, 160, 67, 0.2); color: var(--green); }

        .video-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .video-row img {
            width: 80px;
            height: 45px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--border);
        }

        .video-info h4 {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.3;
        }

        .video-info span {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Son aktivite */
        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .recent-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s;
        }

        .recent-item:hover { border-color: rgba(255, 255, 255, 0.1); }

        .recent-item img {
            width: 64px;
            height: 36px;
            border-radius: 4px;
            object-fit: cover;
        }

        .recent-item .info { flex: 1; }
        .recent-item .info h4 { font-size: 13px; font-weight: 500; }
        .recent-item .info span { font-size: 11px; color: var(--text-dim); }
        .recent-item .time { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            text-align: center;
            padding: 40px;
            color: var(--primary);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>YT AI Analyzer - Admin Panel</h1>
        <span class="badge">ADMIN</span>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-users">-</div>
                <div class="stat-label">Toplam Kullanici</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-analyses">-</div>
                <div class="stat-label">Toplam Analiz</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-pro">-</div>
                <div class="stat-label">Pro Kullanici</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-today">-</div>
                <div class="stat-label">Bugun Analiz</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="recent">Son Aktivite</button>
            <button class="tab-btn" data-tab="users">Kullanicilar</button>
            <button class="tab-btn" data-tab="analyses">Tum Analizler</button>
        </div>

        <div class="tab-panel active" id="panel-recent">
            <div class="loading"><div class="spinner"></div>Yukleniyor...</div>
        </div>

        <div class="tab-panel" id="panel-users">
            <div class="loading"><div class="spinner"></div>Yukleniyor...</div>
        </div>

        <div class="tab-panel" id="panel-analyses">
            <div class="loading"><div class="spinner"></div>Yukleniyor...</div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="../lib/supabase.js"></script>
    <script src="admin.js"></script>
</body>
</html>
